# Server config
server.port=${SERVER_PORT}
#server.servlet.context-path=/server

# Flyway config
spring.flyway.locations=classpath:/db/dev

# Database config
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://localhost:5432/dainf_labs
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jackson.serialization.fail-on-empty-beans=false

# Email config
email.host=smtp.gmail.com
email.port=587

# File upload config
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:/opt/uploads

# Security Oauth2 + Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# File Storage with MINIO
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
minio.port=${MINIO_PORT:9000}
 # Login Account
minio.accessKey=${MINIO_ACCESS_KEY:minioadmin}
 # Login Password
minio.secretKey=${MINIO_SECRET_KEY:minioadmin}
minio.secure=${MINIO_SECURE:false}
minio.bucket-name=${MINIO_BUCKET_NAME:commons}
 # Maximum size of picture file
minio.image-size=10485760
 # Maximum file size
minio.file-size=104857600