
# Server config
server.port=8099
server.servlet.context-path=/server

# Flyway config
spring.flyway.locations=classpath:/db/dev

# Database config
# spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:postgresql://localhost:5432/teste
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jackson.serialization.fail-on-empty-beans=false

# Email config
email.host=smtp.gmail.com
email.port=587

# File upload config
spring.mvc.static-path-pattern=/uploads/**
spring.resources.static-locations=file:/opt/uploads

# Security Oauth2 + Google
spring.security.oauth2.client.registration.google.client-id=${env.GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${env.GOOGLE_CLIENT_SECRET}